<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <!-- ── Primary SEO ─────────────────────────────────────────── -->
    <title>Happy Birthday Khushi 🎁 | A Magical Surprise 2026</title>
    <meta name="description"    content="A magical birthday surprise crafted with love for Khushi. Purple matrix rain, fireworks, and a heartfelt birthday wish!">
    <meta name="keywords"       content="Happy Birthday Khushi, Birthday Surprise 2026, Birthday Wish, Special Birthday">
    <meta name="author"         content="Lucky — luckyverse.tech">
    <meta name="robots"         content="noindex, nofollow, noarchive, nosnippet">
    <meta name="theme-color"    content="#8a2be2">

    <!-- ── Open Graph (WhatsApp / Facebook preview) ────────────── -->
    <meta property="og:type"        content="website">
    <meta property="og:site_name"   content="LuckyVerse">
    <meta property="og:title"       content="Happy Birthday Khushi 🎁">
    <meta property="og:description" content="A magical birthday surprise crafted with love just for you!">
    <meta property="og:image"       content="https://khushi.luckyverse.tech/birthday2026/image/logo.png">
    <meta property="og:url"         content="https://khushi.luckyverse.tech/birthday2026/">
    <meta property="og:locale"      content="en_IN">

    <!-- ── Twitter Card ─────────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary_large_image">
    <meta name="twitter:title"       content="Happy Birthday Khushi 🎁">
    <meta name="twitter:description" content="A magical birthday surprise crafted with love!">
    <meta name="twitter:image"       content="https://khushi.luckyverse.tech/birthday2026/image/logo.png">

    <!-- ── Security Headers (meta fallback for static hosting) ─── -->
    <meta http-equiv="X-Content-Type-Options"  content="nosniff">
    <meta http-equiv="X-Frame-Options"         content="DENY">
    <meta http-equiv="Referrer-Policy"         content="strict-origin-when-cross-origin">
    <meta http-equiv="Permissions-Policy"      content="camera=(), microphone=(), geolocation=()">
    <!-- Content-Security-Policy: only load from same origin -->
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; frame-ancestors 'none'; base-uri 'self';">

    <!-- ── Icons ────────────────────────────────────────────────── -->
    <link rel="icon"             href="image/logo.png" type="image/png">
    <link rel="apple-touch-icon" href="image/logo.png">

    <!-- ── Fonts (local offline cache) ──────────────────────────── -->
    <link rel="preload" href="fonts/googleapis/css/family=Pacifico&display=swap.css"                              as="style" onload="this.onload=null;this.rel='stylesheet'">
    <link rel="preload" href="fonts/googleapis/css2/family=Dancing+Script_wght@400;500;600;700&display=swap.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript>
        <link href="fonts/googleapis/css/family=Pacifico&display=swap.css" rel="stylesheet">
        <link href="fonts/googleapis/css2/family=Dancing+Script_wght@400;500;600;700&display=swap.css" rel="stylesheet">
    </noscript>

    <!-- ── Stylesheet ───────────────────────────────────────────── -->
    <link rel="stylesheet" href="css/style.css">

    <!-- ── Canonical ────────────────────────────────────────────── -->
    <link rel="canonical" href="https://khushi.luckyverse.tech/birthday2026/">
</head>
<body>

    <!-- Matrix rain canvas -->
    <canvas id="matrix-rain" aria-hidden="true"></canvas>

    <!-- Countdown number -->
    <div id="countdown" aria-live="polite" aria-atomic="true"></div>

    <!-- Birthday message card -->
    <div id="textDisplay" role="main">
        <div id="textContent"></div>
    </div>

    <!-- Animated birthday GIF -->
    <img id="giftGif"
         src="1.gif"
         alt="Happy Birthday Khushi! 🎁"
         draggable="false"
         aria-hidden="true">

    <!-- Fireworks layer -->
    <div id="fireworks" aria-hidden="true"></div>

    <!-- App logic (security + animation) -->
    <script src="js/app.js"></script>

</body>
</html>
