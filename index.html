
<style>
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  @keyframes sparkle { 0%,100%{opacity:0;transform:scale(0)} 50%{opacity:1;transform:scale(1)} }
  @keyframes pop { 0%{transform:scale(1)} 50%{transform:scale(1.15)} 100%{transform:scale(1)} }
  @keyframes shimmer { 0%{background-position:0% 50%} 100%{background-position:200% 50%} }
  @keyframes rise { 0%{transform:translateY(100px);opacity:0} 100%{transform:translateY(0);opacity:1} }
  @keyframes twinkle { 0%,100%{opacity:.3;transform:scale(.8)} 50%{opacity:1;transform:scale(1.2)} }
  @keyframes confettiFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(400px) rotate(720deg);opacity:0} }
  @keyframes heartbeat { 0%,100%{transform:scale(1)} 30%{transform:scale(1.3)} 60%{transform:scale(1.1)} }
  @keyframes gradientShift { 0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%} }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  
/* CODED BY LUCKY*/
  
  .birthday-wrap {
    min-height: 520px;
    padding: 2rem 1rem 2.5rem;
    position: relative;
    overflow: hidden;
    background: linear-gradient(135deg, #1a0533 0%, #2d0a4e 30%, #1a1a4e 60%, #0d2b4e 100%);
    background-size: 300% 300%;
    animation: gradientShift 8s ease infinite;
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    font-family: var(--font-sans);
  }

  .stars-bg { position:absolute; inset:0; pointer-events:none; overflow:hidden; }
  .star {
    position:absolute; border-radius:50%;
    background:#fff;
    animation: twinkle var(--d,2s) ease-in-out infinite;
    animation-delay: var(--dl,0s);
  }

  .confetti-piece {
    position:absolute; width:8px; height:8px; border-radius:2px;
    animation: confettiFall var(--d,3s) ease-in var(--dl,0s) infinite;
    opacity:0;
  }

  .title-area {
    position:relative; z-index:2; text-align:center; margin-bottom:1.5rem;
    animation: rise .8s ease both;
  }

  .for-label {
    font-size:13px; color:rgba(255,255,255,.6); letter-spacing:3px; text-transform:uppercase; margin-bottom:.4rem;
  }

  .name-text {
    font-size:clamp(2rem,8vw,3.2rem); font-weight:500; letter-spacing:1px;
    background: linear-gradient(90deg, #ff9de2, #ffd6a5, #fdffb6, #caffbf, #9bf6ff, #c0b3f8, #ff9de2);
    background-size: 300% auto;
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 4s linear infinite;
  }

  .balloon-row {
    display:flex; gap:1.2rem; margin-bottom:1.2rem; position:relative; z-index:2;
  }

  .balloon {
    display:flex; flex-direction:column; align-items:center;
    animation: float var(--d,3s) ease-in-out infinite;
    animation-delay: var(--dl,0s);
  }

  .balloon-body {
    width:38px; height:48px; border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
    position:relative;
  }
  .balloon-body::after {
    content:''; position:absolute; bottom:-6px; left:50%; transform:translateX(-50%);
    width:0; height:0;
    border-left:4px solid transparent; border-right:4px solid transparent;
    border-top:7px solid var(--bc, #ff9de2);
  }
  .balloon-string { width:1px; height:28px; background:rgba(255,255,255,.4); margin-top:1px; }

  .countdown-grid {
    display:grid; grid-template-columns:repeat(4,1fr); gap:12px;
    width:100%; max-width:440px; margin-bottom:1.5rem; position:relative; z-index:2;
    animation: rise .8s ease .3s both;
  }

  .time-box {
    background:rgba(255,255,255,.08); backdrop-filter:blur(4px);
    border:1px solid rgba(255,255,255,.15); border-radius:14px;
    padding:.9rem .5rem; text-align:center;
    transition:transform .2s;
  }
  .time-box:hover { transform:scale(1.05); background:rgba(255,255,255,.13); }

  .time-box.pulse { animation: pop .4s ease; }

  .time-num {
    font-size:clamp(1.6rem,5vw,2.5rem); font-weight:500; line-height:1;
    background: linear-gradient(180deg, #ffffff 0%, #d4aaff 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text;
    display:block; margin-bottom:.3rem;
  }

  .time-label {
    font-size:10px; color:rgba(255,255,255,.5); letter-spacing:2px; text-transform:uppercase;
  }

  .tagline {
    font-size:14px; color:rgba(255,255,255,.65); text-align:center;
    position:relative; z-index:2; animation: rise .8s ease .5s both;
    line-height:1.6; max-width:340px;
  }

  .heart-icon {
    font-size:18px; display:inline-block;
    animation: heartbeat 1.2s ease infinite;
  }

  .spark {
    position:absolute; width:6px; height:6px; border-radius:50%;
    animation: sparkle var(--d,2s) ease-in-out infinite;
    animation-delay: var(--dl,0s);
    pointer-events:none;
  }

  .birthday-badge {
    background:linear-gradient(135deg,#ff9de2,#c0b3f8);
    color:#2d0a4e; font-size:11px; font-weight:500; letter-spacing:1px;
    text-transform:uppercase; padding:4px 14px; border-radius:20px;
    margin-bottom:.5rem; display:inline-block;
  }
</style>

<div class="birthday-wrap" id="bwrap">
  <div class="stars-bg" id="starsContainer"></div>

  <div class="title-area">
    <div class="birthday-badge">Birthday countdown</div>
    <div class="for-label">For my best friend</div>
    <div class="name-text">Khushi ✦</div>
  </div>

  <div class="balloon-row" id="balloonRow"></div>

  <div class="countdown-grid">
    <div class="time-box" id="box-d"><span class="time-num" id="days">00</span><span class="time-label">Days</span></div>
    <div class="time-box" id="box-h"><span class="time-num" id="hours">00</span><span class="time-label">Hours</span></div>
    <div class="time-box" id="box-m"><span class="time-num" id="minutes">00</span><span class="time-label">Minutes</span></div>
    <div class="time-box" id="box-s"><span class="time-num" id="seconds">00</span><span class="time-label">Seconds</span></div>
  </div>

  <div class="tagline" id="taglineEl">
    <span class="heart-icon">♡</span> Counting every moment until we celebrate you, Khushi! <span class="heart-icon">♡</span>
  </div>
</div>

<script>
(function(){
  const starsC = document.getElementById('starsContainer');
  const bwrap = document.getElementById('bwrap');
  
  for(let i=0;i<60;i++){
    const s=document.createElement('div');
    s.className='star';
    const sz=Math.random()*3+1;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*3}s;--dl:${Math.random()*3}s`;
    starsC.appendChild(s);
  }

  const confColors=['#ff9de2','#ffd6a5','#fdffb6','#caffbf','#9bf6ff','#c0b3f8','#ffadad'];
  for(let i=0;i<18;i++){
    const c=document.createElement('div');
    c.className='confetti-piece';
    c.style.cssText=`left:${Math.random()*100}%;top:-10px;background:${confColors[i%confColors.length]};--d:${3+Math.random()*4}s;--dl:${Math.random()*5}s;border-radius:${Math.random()>0.5?'50%':'3px'}`;
    bwrap.appendChild(c);
  }

  const balloons=[
    {color:'#ff9de2',bc:'#ff9de2',d:'3.2s',dl:'0s'},
    {color:'#c0b3f8',bc:'#c0b3f8',d:'2.8s',dl:'.4s'},
    {color:'#ffd6a5',bc:'#ffd6a5',d:'3.5s',dl:'.2s'},
    {color:'#9bf6ff',bc:'#9bf6ff',d:'3s',dl:'.6s'},
    {color:'#caffbf',bc:'#caffbf',d:'2.6s',dl:'.3s'}
  ];
  const row=document.getElementById('balloonRow');
  balloons.forEach(b=>{
    const wrap=document.createElement('div');
    wrap.className='balloon';
    wrap.style.cssText=`--d:${b.d};--dl:${b.dl}`;
    wrap.innerHTML=`<div class="balloon-body" style="background:${b.color};--bc:${b.bc}"></div><div class="balloon-string"></div>`;
    row.appendChild(wrap);
  });

  for(let i=0;i<12;i++){
    const sp=document.createElement('div');
    sp.className='spark';
    sp.style.cssText=`top:${10+Math.random()*80}%;left:${5+Math.random()*90}%;background:${confColors[i%confColors.length]};--d:${1.5+Math.random()*2.5}s;--dl:${Math.random()*2}s`;
    bwrap.appendChild(sp);
  }

  const birthday=new Date('2026-05-18T00:00:00');
  const pad=n=>String(n).padStart(2,'0');

  let prevSec=-1, prevMin=-1, prevHour=-1, prevDay=-1;

  function pulse(id){
    const el=document.getElementById(id);
    el.classList.remove('pulse');
    void el.offsetWidth;
    el.classList.add('pulse');
  }

  function update(){
    const now=new Date();
    const diff=birthday-now;

    if(diff<=0){
      document.getElementById('days').textContent='00';
      document.getElementById('hours').textContent='00';
      document.getElementById('minutes').textContent='00';
      document.getElementById('seconds').textContent='00';
      document.getElementById('taglineEl').innerHTML='<span class="heart-icon">♡</span> Happy Birthday Khushi!! Wishing you all the love & joy! <span class="heart-icon">♡</span>';
      return;
    }

    const d=Math.floor(diff/86400000);
    const h=Math.floor((diff%86400000)/3600000);
    const m=Math.floor((diff%3600000)/60000);
    const s=Math.floor((diff%60000)/1000);

    if(s!==prevSec){document.getElementById('seconds').textContent=pad(s);pulse('box-s');prevSec=s;}
    if(m!==prevMin){document.getElementById('minutes').textContent=pad(m);pulse('box-m');prevMin=m;}
    if(h!==prevHour){document.getElementById('hours').textContent=pad(h);pulse('box-h');prevHour=h;}
    if(d!==prevDay){document.getElementById('days').textContent=pad(d);pulse('box-d');prevDay=d;}
  }

  update();
  setInterval(update,1000);
})();
</script>
