<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Happy Birthday Khushi 🎂</title>
<meta name="robots" content="noindex,nofollow">
<meta name="theme-color" content="#ff6b9d">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-user-select:none}
html,body{min-height:100vh;background:linear-gradient(160deg,#ffe4f0,#ffd6e7,#ffecf5);display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Segoe UI',Arial,sans-serif;overflow:hidden;position:relative}

/* Floating bg emojis */
.bgh{position:fixed;opacity:.15;pointer-events:none;animation:bgFloat var(--d,8s) ease-in-out infinite;animation-delay:var(--dl,0s)}
@keyframes bgFloat{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-25px) rotate(10deg)}}

/* Card */
.card{background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-radius:28px;padding:clamp(28px,6vw,56px) clamp(22px,5vw,48px);max-width:480px;width:88vw;text-align:center;box-shadow:0 20px 80px rgba(255,107,157,.2),0 8px 32px rgba(0,0,0,.06);position:relative;z-index:10;animation:cardIn .8s cubic-bezier(.34,1.56,.64,1) forwards}
@keyframes cardIn{from{transform:scale(.7) translateY(30px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}

/* HBD image */
.hbd-img{font-size:clamp(64px,16vw,96px);display:block;line-height:1;margin-bottom:18px;animation:bounce 2s ease-in-out infinite}
@keyframes bounce{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-12px) scale(1.07)}}

/* Text */
h1{font-size:clamp(19px,4.5vw,26px);font-weight:800;color:#ff3d7f;line-height:1.3;margin-bottom:10px}
.sub{font-size:clamp(13px,3vw,15px);color:#aaa;margin-bottom:28px}

/* Button */
.btn{display:inline-block;background:linear-gradient(135deg,#ff6b9d,#ff3d7f);color:#fff;border:none;border-radius:50px;padding:clamp(14px,3.5vw,18px) clamp(32px,7vw,54px);font-size:clamp(15px,3.5vw,18px);font-weight:700;cursor:pointer;letter-spacing:.5px;box-shadow:0 8px 30px rgba(255,61,127,.4);transition:all .3s;animation:pulse 2.5s ease-in-out infinite}
.btn:hover{transform:translateY(-3px) scale(1.04);box-shadow:0 14px 40px rgba(255,61,127,.55)}
.btn:active{transform:scale(.97)}
@keyframes pulse{0%,100%{box-shadow:0 8px 30px rgba(255,61,127,.4)}50%{box-shadow:0 8px 40px rgba(255,61,127,.75)}}

/* Overlay for page transition */
#ov{position:fixed;inset:0;background:#000;opacity:0;z-index:999;pointer-events:none;transition:opacity .5s ease}
</style>
</head>
<body>

<!-- Background floating emojis -->
<span class="bgh" style="font-size:28px;left:6%;top:12%;--d:7s;--dl:-2s">💕</span>
<span class="bgh" style="font-size:22px;left:84%;top:18%;--d:9s;--dl:-4s">🌸</span>
<span class="bgh" style="font-size:26px;left:12%;top:72%;--d:8s;--dl:-1s">💗</span>
<span class="bgh" style="font-size:20px;left:82%;top:68%;--d:6s;--dl:-3s">🌷</span>
<span class="bgh" style="font-size:18px;left:48%;top:6%;--d:10s;--dl:-5s">✨</span>
<span class="bgh" style="font-size:24px;left:3%;top:48%;--d:8s;--dl:-6s">💝</span>
<span class="bgh" style="font-size:20px;left:90%;top:46%;--d:7s;--dl:-2.5s">🌸</span>
<span class="bgh" style="font-size:22px;left:40%;top:88%;--d:9s;--dl:-3.5s">💫</span>

<!-- Transition overlay -->
<div id="ov"></div>

<!-- Main card -->
<div class="card">
    <span class="hbd-img">🎁</span>
    <h1 id="heading">A Cutiepie was born today,<br><span id="ageText"></span> years ago!</h1>
    <p class="sub">Yes, it's YOU! A little surprise awaits… 🌟</p>
    <button class="btn" id="startBtn">🎊 Start the Surprise</button>
</div>

<script>
(function(){
    'use strict';
    // ── Config: set Khushi's birth year ──
    var BIRTH_YEAR = 2003;
    var age = new Date().getFullYear() - BIRTH_YEAR;
    document.getElementById('ageText').textContent = age;

    // Disable right-click & shortcuts
    document.addEventListener('contextmenu',function(e){e.preventDefault();});
    document.addEventListener('keydown',function(e){
        if(e.key==='F12'||(e.ctrlKey&&'uUsSaAcCpPiI'.includes(e.key))){e.preventDefault();}
    });

    // Button click — fade to black, then navigate
    document.getElementById('startBtn').addEventListener('click',function(){
        var ov = document.getElementById('ov');
        ov.style.opacity = '1';
        ov.style.pointerEvents = 'all';
        setTimeout(function(){ window.location.href = 'surprise.html'; }, 520);
    });
})();
</script>
</body>
</html>
